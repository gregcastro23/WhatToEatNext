nodeLinker: node-modules
enableGlobalCache: false

# Network resilience settings for Vercel builds
httpTimeout: 300000
httpRetry: 3
enableNetwork: true

# Registry settings
npmRegistryServer: "https://registry.npmjs.org/"
enableImmutableInstalls: false

# Suppress peer dependency warnings for @ai-sdk packages.
# @ai-sdk/react requires zod as a peer dep; our workspace provides it at ^3.23.0.
packageExtensions:
  "@ai-sdk/react@*":
    peerDependencies:
      zod: "*"

# Suppress harmless warnings:
# - YN0060: @auth/core@0.41.0 lists nodemailer as an OPTIONAL peer dep with ^6.8.0,
#   but next-auth@5-beta requires ^7.x. Since it's optional and API-compatible, suppress.
logFilters:
  - code: YN0060
    text: "nodemailer"
    level: discard
