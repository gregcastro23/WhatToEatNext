version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    reviewers:
      - "gregcastro23"
    assignees:
      - "gregcastro23"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    groups:
      all-npm-dependencies:
        patterns:
          - "*"
        # Group only safe minor/patch bumps; any non-ignored major arrives as
        # its own PR for individual review.
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major bumps for these are handled manually as dedicated migrations
      # (see TECH_WEEK_ROADMAP backlog) — never auto-PR'd.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"        # v4 = engine/config rewrite; app pinned to v3 (overrides)
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"             # linter majors handled with the plugin chain
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "storybook"          # dev-only tooling; not in the prod/build path
        update-types: ["version-update:semver-major"]
      - dependency-name: "@storybook/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-devtools"
        update-types: ["version-update:semver-major"]
      - dependency-name: "date-fns"           # v4 coupled to the WTEN port (staging uses v2 API)
        update-types: ["version-update:semver-major"]

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    reviewers:
      - "gregcastro23"
    assignees:
      - "gregcastro23"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "github-actions"
      - "automated"
    groups:
      all-github-actions:
        patterns:
          - "*"

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    reviewers:
      - "gregcastro23"
    assignees:
      - "gregcastro23"
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "docker"
      - "automated"
    groups:
      all-docker:
        patterns:
          - "*"

  # Enable version updates for Terraform
  - package-ecosystem: "terraform"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    reviewers:
      - "gregcastro23"
    assignees:
      - "gregcastro23"
    commit-message:
      prefix: "terraform"
      include: "scope"
    labels:
      - "terraform"
      - "automated"
    groups:
      all-terraform:
        patterns:
          - "*"
