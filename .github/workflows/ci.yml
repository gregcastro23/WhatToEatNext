name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  NEXT_PUBLIC_ENABLE_ASTRO_DEBUG: false
  NEXT_PUBLIC_API_CACHE_TIME: 3600
  CI: true
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Verify
            command: bun run verify
          - name: Build
            command: bun run build
          - name: Test
            command: bun run test --passWithNoTests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Setup safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Create env file
        run: |
          echo "NEXT_PUBLIC_ENABLE_ASTRO_DEBUG=false" > .env.local
          echo "NEXT_PUBLIC_API_CACHE_TIME=3600" >> .env.local
          echo "NODE_ENV=test" >> .env.local
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  # NOTE: frontend prod deploys are handled by Vercel's native Git integration
  # (auto-deploys on master merge — see CLAUDE.md + the "Vercel" status check).
  # A second amondnet/vercel-action "Deploy to Vercel" job used to live here, but
  # it duplicated that deploy and ran via npm (which tripped on the package.json
  # tailwindcss override), so it was removed. Re-add only if native deploys stop.
